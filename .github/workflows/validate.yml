name: validate

# Self-validation for the agent-protocol repo itself. The repo preaches
# evidence-before-completion and phase-gate discipline; this workflow
# holds the repo to its own contract.
#
# Security note: this workflow uses NO untrusted event inputs
# (no github.event.issue.*, github.event.pull_request.*, github.head_ref, etc.).
# All "run:" commands execute hardcoded scripts in .github/scripts/ or
# fixed tool invocations. No injection surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:

  schema-syntax:
    name: Schema meta-validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml jsonschema
      - name: Validate schemas against JSON Schema 2020-12 meta-schema
        run: python3 .github/scripts/validate-schema-syntax.py

  schema-drift:
    name: YAML→JSON schema drift
    runs-on: ubuntu-latest
    needs: schema-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml
      - name: Fail if schemas/*.json is out of sync with schemas/*.yaml
        run: python3 .github/scripts/generate-schema-json.py --check

  changelog-drift:
    name: CHANGELOG.md→CHANGELOG.json drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail if CHANGELOG.json is out of sync with CHANGELOG.md
        run: python3 .github/scripts/generate-changelog-json.py --check

  summary-drift:
    name: docs/ TL;DR vs body count drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail if any docs/*.md TL;DR disagrees with its body count
        run: python3 .github/scripts/check-summary-drift.py

  template-conformance:
    name: Template conformance
    runs-on: ubuntu-latest
    needs: schema-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml jsonschema
      - name: Validate every template against change-manifest.schema.yaml
        run: python3 .github/scripts/validate-templates.py
      - name: Validate starter-repo example manifest
        working-directory: examples/starter-repo
        run: python3 scripts/validate-manifest.py

  cluster-disjointness:
    name: Pattern C cluster disjointness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pyyaml
      - name: Validate implementation_clusters scope_files are pair-wise disjoint
        run: python3 .github/scripts/validate-cluster-disjointness.py

  legacy-terms:
    name: Retired-vocabulary block
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Block re-introduction of retired aliases (per docs/glossary.md §Note on legacy names)
        run: python3 .github/scripts/check-legacy-terms.py

  role-consistency:
    name: Multi-agent role-contract consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify role invariants in SoT + 9 runtime mirrors (Claude Code / Cursor / Gemini CLI / Windsurf / Codex)
        run: python3 .github/scripts/check-role-consistency.py

  internal-links:
    name: Markdown internal-link integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fail if any *.md has a broken relative link (offline-only check; external URLs skipped)
        run: python3 .github/scripts/check-internal-links.py

  hooks-shellcheck:
    name: Hook bundle shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print shellcheck version
        # shellcheck is preinstalled on ubuntu-latest runners; pin a known
        # baseline by failing fast if it is ever missing.
        run: shellcheck --version
      - name: Lint hook scripts and adapters
        # Targeted at the runtime-hook surface (hooks + adapters + selftests).
        # This is the second-line deterministic defense against shell injection
        # patterns (heredoc-without-quoting, unquoted word splitting, eval) that
        # a model-only review can miss. Other shell files in the repo (e.g.
        # validator-posix-shell/) have separate scope and are not gated here.
        run: |
          shellcheck -s sh \
            reference-implementations/hooks-claude-code/hooks/*.sh \
            reference-implementations/hooks-claude-code/selftests/*.sh \
            reference-implementations/hooks-codex/adapter/*.sh \
            reference-implementations/hooks-codex/selftests/*.sh \
            reference-implementations/hooks-cursor/adapter/*.sh \
            reference-implementations/hooks-cursor/selftests/*.sh \
            reference-implementations/hooks-gemini-cli/adapter/*.sh \
            reference-implementations/hooks-gemini-cli/selftests/*.sh \
            reference-implementations/hooks-windsurf/adapter/*.sh \
            reference-implementations/hooks-windsurf/selftests/*.sh

  hooks-selftest:
    name: Hook bundle selftest
    runs-on: ubuntu-latest
    needs: hooks-shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Run Claude Code hook selftest
        run: sh reference-implementations/hooks-claude-code/selftests/selftest.sh
      - name: Run Cursor adapter selftest
        run: sh reference-implementations/hooks-cursor/selftests/selftest.sh
      - name: Run Gemini CLI adapter selftest
        run: sh reference-implementations/hooks-gemini-cli/selftests/selftest.sh
      - name: Run Windsurf adapter selftest
        run: sh reference-implementations/hooks-windsurf/selftests/selftest.sh
      - name: Run Codex adapter selftest
        run: sh reference-implementations/hooks-codex/selftests/selftest.sh

  validator-python-tests:
    name: Python validator pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator + pytest
        working-directory: reference-implementations/validator-python
        run: |
          pip install -e .
          pip install pytest
      - name: Run pytest
        working-directory: reference-implementations/validator-python
        run: pytest -q

  # validator-node-tests job removed in 1.20.0 — `validator-node` was
  # demoted to community-maintained (`reference-implementations/community/validator-node/`).
  # The community label means rule parity with the canonical algorithm is
  # no longer guaranteed by this repository's CI; adopters run the bundled
  # `tests/` against their own manifests. See `reference-implementations/INVENTORY.md`
  # §Validator classes.

  version-consistency:
    name: Version string consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check plugin.json / marketplace.json / README badge / CHANGELOG agree
        run: sh .github/scripts/check-version-consistency.sh
