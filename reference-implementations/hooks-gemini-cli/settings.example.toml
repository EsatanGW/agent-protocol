# Reference hook wiring for Gemini CLI.
#
# Treat this file as the normative intent (which hook fires on which
# event) rather than as a byte-exact config. Adjust section names and
# field names to match your Gemini CLI version; keep the commands and
# the ordering identical. Paths assume this adapter sits next to
# ../hooks-claude-code/hooks/; absolute paths also work.

[[hooks.pre_command]]
matches = "git commit*"
command = "sh ./reference-implementations/hooks-claude-code/hooks/manifest-required.sh"
agentProtocol = { category = "phase-gate", level = "block", ruleIds = ["phase-gate.manifest-required"] }

[[hooks.pre_command]]
matches = "git commit*"
command = "sh ./reference-implementations/hooks-claude-code/hooks/evidence-artifact-exists.sh"
agentProtocol = { category = "evidence", level = "block", ruleIds = ["evidence.artifact-exists"] }

[[hooks.pre_command]]
matches = "git push*"
command = "sh ./reference-implementations/hooks-claude-code/hooks/consumer-registry-check.sh"
agentProtocol = { category = "drift", level = "warn", ruleIds = ["drift.consumer-registry-stale"] }

[[hooks.post_tool]]
matches = "edit|write"
command = "sh ./reference-implementations/hooks-claude-code/hooks/sot-drift-check.sh"
agentProtocol = { category = "drift", level = "warn", ruleIds = ["drift.sot-file-must-move"] }

[[hooks.session_end]]
command = "sh ./reference-implementations/hooks-claude-code/hooks/completion-audit.sh"
agentProtocol = { category = "completion-audit", level = "block", ruleIds = [
  "completion.evidence-complete",
  "completion.unaccepted-risk",
  "completion.unresolved-escalation",
  "completion.observe-needs-narrative",
] }
