# yaml-language-server: $schema=../schemas/change-manifest.schema.yaml
#
# Worked example: multi-agent handoff progression of a single Change Manifest
# through Planner → Implementer → Reviewer, shown as three sequential snapshots
# of the same change_id (separated by --- in the same file for illustration only;
# in a real repo each snapshot would be a separate commit to the same file).
#
# Each snapshot below is an independently schema-valid Change Manifest. Upstream
# fields are copied verbatim between snapshots — the Implementer does NOT rewrite
# Planner fields; the Reviewer does NOT rewrite either. Only the snapshot's own
# phase advances the owned fields.
#
# Paired with: docs/multi-agent-handoff.md

# ─── Snapshot 1: Planner has just handed off to Implementer ──────────────────
change_id: "2026-04-20-add-notification-preferences"
title: "Add per-channel notification preferences for end users"
phase: implement                        # Planner set this when handing over
status: in_progress
last_updated: "2026-04-20T09:00:00Z"
authors:
  - { name: "planner-agent", role: ai, identifier: "planner-agent@vendor-neutral#run-abc123" }

surfaces_touched:
  - { surface: user,             role: primary,  notes: "New settings screen with per-channel toggles" }
  - { surface: system_interface, role: primary,  notes: "New preference GET/PUT endpoints" }
  - { surface: information,      role: primary,  notes: "New preferences table + enum of channel kinds" }
  - { surface: operational,      role: consumer, notes: "Telemetry for preference changes; docs update" }

uncontrolled_interfaces:
  - name: "platform push policy"
    kind: platform_os
    monitoring_channel: "platform-release-notes-subscription"

sot_map:
  - info_name: "notification channel enum"
    pattern: 3                          # Enum/Status-Defined
    source: "shared/contracts/notification-channels.proto"
    consumers:
      - { name: "backend service",        kind: code,          sync_lag: synchronous }
      - { name: "frontend client",        kind: code,          sync_lag: batch }
      - { name: "analytics downstream",   kind: data_pipeline, sync_lag: near_real_time }
      - { name: "customer support SOP",   kind: documentation, sync_lag: manual }
    sync_mechanism: "protoc codegen in CI; support SOP linked from enum comment"
    desync_risk: medium

  - info_name: "user preferences table"
    pattern: 1                          # Schema-Defined
    source: "backend/migrations/2026-04-20-add-user-preferences.sql"
    consumers:
      - { name: "preferences API handler", kind: code, sync_lag: synchronous }
      - { name: "notification dispatcher", kind: code, sync_lag: near_real_time }
    sync_mechanism: "ORM model regenerates from migration; dispatcher reads via API"
    desync_risk: low

breaking_change:
  level: L1                             # New enum value; non-exhaustive switches may drop
  self_assessed_vs_worst_case: matches
  affected_consumers:
    - { category: data_downstream,     identifier: "notification-events dashboard" }
    - { category: internal_sync,       identifier: "customer-support macros" }
  migration_path: deprecation_cycle

rollback:
  overall_mode: 1                       # Reversible — behind a remote flag
  per_surface_modes:
    - { surface: system_interface, mode: 1, rationale: "Endpoint behind flag; flag-off removes path" }
    - { surface: information,      mode: 1, rationale: "Table nullable; additive only" }
    - { surface: user,             mode: 1, rationale: "Settings screen guarded by same flag" }
    - { surface: operational,      mode: 3, rationale: "Already-sent notifications cannot be retracted" }
  kill_switch:
    available: true
    mechanism: "remote feature flag 'notification_preferences_v1'"
    tested: false                       # Implementer will verify in Phase 4

evidence_plan:
  - { type: contract_test,     surface: system_interface, status: planned, summary: "OpenAPI + enum extension contract test" }
  - { type: migration_dry_run, surface: information,      status: planned, summary: "Dry-run on staging clone; verify no long locks" }
  - { type: screenshot_diff,   surface: user,             status: planned, summary: "Settings screen with flag on/off" }
  - { type: log_sample,        surface: operational,      status: planned, summary: "preference_changed telemetry event captured" }

---

# ─── Snapshot 2: Implementer hands off to Reviewer ───────────────────────────
# Planner fields (above) are copied verbatim. Implementer appends
# implementation_notes and advances evidence_plan statuses.

