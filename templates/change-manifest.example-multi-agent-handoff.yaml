# Worked example: multi-agent handoff progression of a single Change Manifest
# through Planner → Implementer → Reviewer, shown as three sequential snapshots
# of the same change_id (separated by --- in the same file for illustration only;
# in a real repo each snapshot would be a separate commit to the same file).
#
# Paired with: docs/multi-agent-handoff.md

# ─── Snapshot 1: Planner has just handed off to Implementer ──────────────────
change_id: 2026-04-20-add-notification-preferences
title: "Add per-channel notification preferences for end users"
phase: implement       # Planner set this when handing over
status: in_progress
last_updated: "2026-04-20T09:00:00Z"
authors:
  - name: "planner-agent"
    role: ai
    identifier: "planner-agent@vendor-neutral#run-abc123"

surfaces_touched:
  - surface: user
    role: primary
    notes: "New settings screen with per-channel toggles"
  - surface: system_interface
    role: primary
    notes: "New preference GET/PUT endpoints"
  - surface: information
    role: primary
    notes: "New preferences table + enum of channel kinds"
  - surface: operational
    role: consumer
    notes: "Telemetry for preference changes; docs update"

sot_map:
  - info: "notification channel enum"
    sot_path: "shared/contracts/notification-channels.proto"
    pattern: enum-defined
    consumers:
      - "backend service"
      - "frontend client"
      - "analytics downstream"
      - "customer support SOP"
  - info: "user preferences table"
    sot_path: "backend/migrations/2026-04-20-add-user-preferences.sql"
    pattern: schema-defined
    consumers:
      - "preferences API handler"
      - "notification dispatcher"

breaking_change:
  level: L1              # New enum value; consumers with non-exhaustive switch may drop messages
  rationale: "adds a 'push_high_priority' channel value; existing consumers must handle default"
  migration_path: "two-release consumer warning window"

rollback:
  mode: 1                # Behind a flag; can be reverted by flag-off
  notes: "Already-sent notifications follow mode 3 (no retract)"

uncontrolled_interfaces:
  - kind: platform_policy
    description: "Platform push policies for high-priority channel"
    monitoring_channel: "platform-release-notes-subscription"

evidence_plan:
  categories:
    - "API contract test"
    - "Migration applied + schema snapshot"
    - "UI interaction evidence"
    - "Telemetry event registered"
  artifacts: []          # Implementer fills these in snapshot 2

---

# ─── Snapshot 2: Implementer hands off to Reviewer ───────────────────────────
