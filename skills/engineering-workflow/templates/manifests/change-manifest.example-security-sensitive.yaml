# ─── AI Hygiene ─────────────────────────────────────────────────────────
assumptions:
  - statement: "Longest live token TTL is 24h (refresh-token-issued access token)."
    confidence: high
    validation_plan: "Verified against oauth-config; JWT `exp` claim capped at 24h in issuer."
  - statement: "All downstream API gateways use identity-platform-sdk >= v3.2 (multi-kid capable)."
    confidence: high
    validation_plan: "dependency-graph query; one edge case (internal batch processor on v3.1) upgraded in preparatory change `2026-04-19-batch-sdk-bump`."
  - statement: "JWKS cache TTL at all verifiers is ≤ 10 min."
    confidence: medium
    validation_plan: "Cache-Control header enforced server-side; but we cannot verify every downstream's local override. Dashboard will catch stragglers during the 24h monitoring window."

escalations:
  - trigger: security_or_pii_path
    description: |
      Per ai-operating-contract.md §5 — this change modifies authentication
      cryptographic material. AI produced the manifest, dual-issuer code,
      and runbook; human security-team review required before the
      feature-flag flip at step 4.
    resolved_at: "2026-04-20T10:45:00Z"
    resolved_by: "security-team@internal"
  - trigger: rollback_mode_3
    description: |
      Per ai-operating-contract.md §5 — mode-3 rollback (compensation only)
      requires explicit human acknowledgment of the irreversibility.
      Compensation plan reviewed and accepted; dashboard-driven stop
      conditions defined so the decision to proceed to step 6 (old-key
      retirement) is a human one.
    resolved_at: "2026-04-20T10:50:00Z"
    resolved_by: "security-team@internal"

residual_risks:
  - description: |
      A verifier cluster with a stale JWKS cache (> 10 min) could reject
      valid `new_kid` tokens during the overlap window. Mitigation:
      `jwt_verification_kid_unknown` dashboard is watched continuously
      through the 24h window; on-call is paged on any spike > baseline.
    severity: medium
    mitigation: "Continuous monitoring + documented rollback via feature flag."
    accepted_by: "security-team@internal"
  - description: |
      Partner integrations that pin JWKS by URL but cache locally without
      honoring Cache-Control may see verification failures after old-key
      retirement. 30-day advance notice + test-token distribution reduces
      but does not eliminate this risk.
    severity: low
    mitigation: "Partner-integration smoke-test program before step 6."
    accepted_by: "compliance-team@internal"

handoff_narrative: |
  This change implements the Q2-2026 scheduled JWT signing key rotation.
  The Implementer has landed the dual-issuer code, dual-verifier JWKS
  endpoint, `kid_unknown` error class, runbook, and audit event schema;
  SAST/threat-model/integration/runbook-dry-run evidence is attached.

  The next gate is a human go/no-go at runbook step 4 (feature-flag flip
  from `old_kid` to `new_kid` as active issuer). Do NOT proceed without
  security-team sign-off and live dashboards on the two new panels.

  Rollback is mode-3 compensation: once step 4 has flipped, already-issued
  `new_kid` tokens exist in the wild and can only be invalidated by
  broadcast revocation (forcing re-authentication). This is why the
  feature flag exists — to narrow the blast radius before step 4 by
  verifying the full verifier path is healthy.
